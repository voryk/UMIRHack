<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Дизайн-квиз</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2f7, #d9e4f5);
}

.quiz {
  max-width: 520px;
  margin: 60px auto;
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

h3 { margin-bottom: 20px; }

.progress {
  margin-bottom: 20px;
  font-size: 14px;
  color: #777;
}

.progress-bar {
  height: 6px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  width: 16%;
  background: linear-gradient(90deg, #6a11cb, #2575fc);
  transition: 0.3s;
}

.step {
  display: none;
  animation: fadeIn 0.4s ease;
}

.step.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Кнопки */
.buttons {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

button {
  margin-top: 20px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

button.primary {
  background: linear-gradient(90deg, #6a11cb, #2575fc);
  color: #fff;
}

button.secondary {
  background: #e0e0e0;
  color: #333;
}

button:hover {
  transform: translateY(-2px);
}

/* Инпуты */
input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 10px;
}

/* Радио */
label {
  display: block;
  background: #f7f9fc;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* Слайдер */
input[type=range] {
  width: 100%;
  margin-top: 15px;
}

.range-value {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="quiz">

  <div class="progress">
    Шаг <span id="stepNum">1</span> из 6
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <form id="quizForm">

    <!-- ШАГ 1 -->
    <div class="step active">
      <h3>Тип помещения</h3>
      <label><input type="radio" name="type"> Квартира</label>
      <label><input type="radio" name="type"> Дом</label>
      <label><input type="radio" name="type"> Коммерция</label>

      <div class="buttons">
        <div></div>
        <button type="button" class="primary" onclick="nextStep()">Далее</button>
      </div>
    </div>

    <!-- ШАГ 2 -->
    <div class="step">
      <h3>Количество комнат</h3>
      <input type="number" name="rooms">

      <div class="buttons">
        <button type="button" class="secondary" onclick="prevStep()">Назад</button>
        <button type="button" class="primary" onclick="nextStep()">Далее</button>
      </div>
    </div>

    <!-- ШАГ 3 -->
    <div class="step">
      <h3>Площадь помещения</h3>

      <input type="range" min="20" max="200" step="5" value="60"
        oninput="updateRangeValue(this.value)">

      <div class="range-value">
        <span id="rangeValue">60</span> м²
      </div>

      <div class="buttons">
        <button type="button" class="secondary" onclick="prevStep()">Назад</button>
        <button type="button" class="primary" onclick="nextStep()">Далее</button>
      </div>
    </div>

    <!-- ШАГ 4 -->
    <div class="step">
      <h3>Бюджет проекта</h3>
      <select name="budget">
        <option>До 5 000€</option>
        <option>5 000 – 15 000€</option>
        <option>15 000€+</option>
      </select>

      <div class="buttons">
        <button type="button" class="secondary" onclick="prevStep()">Назад</button>
        <button type="button" class="primary" onclick="nextStep()">Далее</button>
      </div>
    </div>

    <!-- ШАГ 5 -->
    <div class="step">
      <h3>Когда планируете начать?</h3>
      <select name="timeline">
        <option>Срочно</option>
        <option>В течение месяца</option>
        <option>Пока рассматриваю</option>
      </select>

      <div class="buttons">
        <button type="button" class="secondary" onclick="prevStep()">Назад</button>
        <button type="button" class="primary" onclick="nextStep()">Далее</button>
      </div>
    </div>

    <!-- ШАГ 6 -->
    <div class="step">
      <h3>Ваши контакты</h3>
      <input type="text" name="name" placeholder="Имя" required>
      <input type="tel" name="phone" placeholder="Телефон" required>
      <input type="email" name="email" placeholder="Email">

      <div class="buttons">
        <button type="button" class="secondary" onclick="prevStep()">Назад</button>
        <button type="submit" class="primary">Отправить</button>
      </div>
    </div>

  </form>

</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll('.step');

function updateUI() {
  document.getElementById('stepNum').innerText = currentStep + 1;
  document.getElementById('progressFill').style.width =
    ((currentStep + 1) / steps.length * 100) + '%';
}

function nextStep() {
  steps[currentStep].classList.remove('active');
  currentStep++;
  steps[currentStep].classList.add('active');
  updateUI();
}

function prevStep() {
  if (currentStep === 0) return;
  steps[currentStep].classList.remove('active');
  currentStep--;
  steps[currentStep].classList.add('active');
  updateUI();
}

function updateRangeValue(value) {
  document.getElementById('rangeValue').innerText = value;
}

document.getElementById('quizForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert("Спасибо! Мы свяжемся с вами.");
});
</script>

</body>
</html>
